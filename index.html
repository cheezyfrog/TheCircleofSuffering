<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Circle of Suffering</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0-alpha.4/build/cjs/vexflow.js"></script>
</head>
<body>

    <div class="game-container">
        <div class="score-container">
            <div>Score: <span id="score">0</span></div>
            <div>Streak: <span id="streak">0</span></div>
        </div>

        <div id="notation-container"></div>

        <div class="card">
            <h2>Identify this key signature:</h2>
            <div id="key-hint">Type: Major</div>
        </div>

        <div id="options-container" class="options-grid"></div>
        <div id="feedback" class="feedback"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Circle of Suffering</title>
  
  <!-- PWA Manifest & App Icons -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Core Music Notation Engine (VexFlow) -->
  <script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0-alpha.4/build/cjs/vexflow.js"></script>

  <!-- App Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">
    <div class="stats-panel">
      <div>Time: <span id="time-display">60s</span></div>
      <div>Score: <span id="score-display">0</span></div>
      <div>Best: <span id="best-display">0</span></div>
    </div>

    <!-- Container where VexFlow draws the staff -->
    <div id="notation-container">
      <div id="status-message">Press Start to Begin</div>
    </div>

    <div class="question-panel">
      <h2>Identify this key signature:</h2>
      <p>Type: <span id="key-type">Major</span></p>
    </div>

    <!-- Multiple choice selection buttons -->
    <div id="options-container" class="options-grid">
      <!-- Buttons are dynamically generated by app.js here -->
    </div>

    <button id="start-button" class="action-btn">START ROUND</button>
  </div>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered successfully.', reg.scope))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>

  <!-- Main Game Logic Execution -->
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <div class="game-container">
        <div class="score-container">
            <div>Time: <span id="timer">60</span>s</div>
            <div>Score: <span id="score">0</span></div>
            <div>Best: <span id="high-score">0</span></div>
        </div>

        <div id="notation-container"></div>

        <div class="card">
            <h2 id="question-prompt">Identify this key signature:</h2>
            <div id="key-hint">Type: Major</div>
        </div>

        <div id="options-container" class="options-grid"></div>
        <div id="feedback" class="feedback"></div>
        
        <button id="start-btn" onclick="startRound()" style="width: 100%; margin-top: 15px; font-weight: bold; background-color: #2ecc71; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer;">START ROUND</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
